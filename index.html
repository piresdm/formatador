<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formatador de Documentos DJULG</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header class="djulg-header">
      <div class="djulg-header-inner">
        <img
          src="assets/bandeira_sem_fundo.png"
          alt="Logo TCE-PE"
          class="djulg-logo"
        />
        <div class="djulg-header-text">
          <h1 class="djulg-title">Formatador de Documentos</h1>
          <p class="djulg-subtitle">Diretoria de Julgamento</p>
        </div>
      </div>
    </header>
    <main class="container py-4">
      <div class="card">
        <div class="card-body">
          <label for="docType" class="form-label"> Tipo de documento </label>
          <select id="docType" class="form-select" required>
            <option value="" selected>Selecione...</option>
          </select>

          <br />

          <div
            id="extracaoInfoAlert"
            class="alert alert-info mb-3"
            role="alert"
          >
            Nota: A diferença entre a extração <strong>pré-sessão</strong> e a
            <strong>pós-sessão</strong> é que a planilha
            <strong>pós-sessão</strong> inclui a coluna
            <strong>"Status Final"</strong>, que apresenta o status do processo
            ao término da sessão.
          </div>

          <div id="moduleContainer" class="mt-3"></div>
        </div>
      </div>
    </main>

    <!-- Bibliotecas globais -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- PDF (pdfmake) -->
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/vfs_fonts.js"></script>

    <!-- Leitura de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>

    <script type="module" src="app.js"></script>
  </body>
</html>
