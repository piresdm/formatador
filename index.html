<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formatador de Documentos DJULG</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="container py-4">
      <h1 class="h3 mb-5">Formatador de Documentos DJULG</h1>

      <div class="card">
        <div class="card-body">
          <label for="docType" class="form-label">Formatação Desejada</label>
          <select id="docType" class="form-select" required>
            <option value="" selected>Selecione...</option>
            <option value="LINKS">Links</option>
            <option value="RELATORIO_PAUTA_DINAMICA">
              Relatório Pauta Dinâmica
            </option>
            <option value="PAUTA_MANUAL">Pauta Manual</option>
            <option value="EXTRACAO_PAUTA_PRE_SESSAO">
              Extração Pauta (pré-sessão)
            </option>
            <option value="EXTRACAO_PAUTA_POS_SESSAO">
              Extração Pauta (pós-sessão)
            </option>
          </select>
        </br>
          <div id="extracaoInfoAlert" class="alert alert-info mb-3" role="alert">
            Nota: A diferença entre a extração <strong>pré-sessão</strong> e a <strong>pós-sessão</strong> é que a
            planilha <strong>pós-sessão</strong> inclui a coluna <strong>“Status Final”</strong>, que apresenta o
            status do processo ao término da sessão.
          </div>
          <div id="moduleContainer" class="mt-3"></div>
        </div>
      </div>
    </main>

    <!-- Bibliotecas globais -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- PDF (pdfmake) -->
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/pdfmake.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/vfs_fonts.js"></script>

    <script type="module" src="app.js"></script>
  </body>
</html>
